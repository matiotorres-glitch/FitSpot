<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>FitSpot — Entrena. Comparte. Conecta.</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    :root {
      --brand: #D85A30;
      --brand-light: #FAECE7;
      --brand-dark: #993C1D;
      --bg: #ffffff;
      --bg2: #f8f8f8;
      --border: #eeeeee;
      --text: #111111;
      --text2: #888888;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a;
        --bg2: #2a2a2a;
        --border: #333333;
        --text: #f0f0f0;
        --text2: #888888;
      }
    }
    body { background: var(--bg); color: var(--text); max-width: 480px; margin: 0 auto; min-height: 100vh; }

    /* HEADER */
    .hdr { background: var(--brand); color: white; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .hdr-brand { display: flex; flex-direction: column; }
    .hdr-logo { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
    .hdr-claim { font-size: 11px; opacity: 0.8; }
    .hdr-avatar { width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,0.25); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; }

    /* BOTTOM NAV */
    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--bg); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 4px 6px; cursor: pointer; color: var(--text2); font-size: 10px; gap: 2px; border: none; background: none; }
    .nav-item i { font-size: 22px; }
    .nav-item.active { color: var(--brand); }

    /* PAGES */
    .page { padding: 16px 16px 90px; display: none; }
    .page.active { display: block; }

    /* AUTH */
    .auth-page { padding: 40px 24px 40px; }
    .auth-logo { text-align: center; font-size: 36px; font-weight: 700; color: var(--brand); }
    .auth-claim { text-align: center; font-size: 14px; color: var(--text2); margin: 4px 0 32px; }
    .auth-tabs { display: flex; background: var(--bg2); border-radius: 12px; padding: 4px; margin-bottom: 24px; }
    .auth-tab { flex: 1; padding: 9px; text-align: center; font-size: 14px; cursor: pointer; border-radius: 9px; color: var(--text2); border: none; background: none; transition: all 0.2s; }
    .auth-tab.active { background: var(--bg); color: var(--text); font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,0.12); }
    .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .form-label { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.3px; }
    .form-input { padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 15px; background: var(--bg); color: var(--text); width: 100%; transition: border-color 0.2s; -webkit-appearance: none; }
    .form-input:focus { outline: none; border-color: var(--brand); }
    .btn-primary { background: var(--brand); color: white; border: none; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 4px; transition: background 0.2s; }
    .btn-primary:active { background: var(--brand-dark); }
    .btn-ghost { background: none; border: none; color: var(--brand); font-size: 14px; cursor: pointer; padding: 12px; width: 100%; text-align: center; }
    .msg-error { background: #FCEBEB; color: #A32D2D; border-radius: 10px; padding: 11px 14px; font-size: 13px; margin-bottom: 14px; display: none; line-height: 1.4; }
    .msg-ok { background: #EAF3DE; color: #3B6D11; border-radius: 10px; padding: 11px 14px; font-size: 13px; margin-bottom: 14px; display: none; }

    /* PROFILE HERO */
    .profile-hero { background: linear-gradient(135deg, var(--brand), var(--brand-dark)); padding: 28px 16px 22px; color: white; text-align: center; margin: -16px -16px 0; }
    .profile-avatar-big { width: 76px; height: 76px; border-radius: 50%; background: rgba(255,255,255,0.25); border: 3px solid rgba(255,255,255,0.5); margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 700; }
    .profile-name { font-size: 21px; font-weight: 700; }
    .profile-handle { font-size: 13px; opacity: 0.8; margin-top: 2px; }
    .profile-bio-text { font-size: 13px; opacity: 0.85; margin-top: 6px; }
    .level-pill { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.2); padding: 5px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-top: 12px; }

    /* PROGRESS */
    .progress-section { padding: 14px 16px 0; }
    .progress-labels { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
    .progress-bar { height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--brand); border-radius: 4px; transition: width 0.6s ease; }

    /* STATS */
    .stats-row { display: grid; grid-template-columns: repeat(3,1fr); background: var(--border); gap: 1px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin: 14px -16px 0; }
    .stat-cell { background: var(--bg); padding: 14px 8px; text-align: center; }
    .stat-num { font-size: 22px; font-weight: 700; color: var(--text); }
    .stat-lbl { font-size: 11px; color: var(--text2); margin-top: 2px; }

    /* POINTS CARD */
    .card { background: var(--bg2); border-radius: 14px; padding: 14px; margin-top: 14px; }
    .card-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 10px; }
    .pts-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .pts-row:last-child { border-bottom: none; }
    .pts-action { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text); }
    .pts-val { font-size: 13px; font-weight: 600; color: var(--brand); }

    /* FEED */
    .feed-card { background: var(--bg); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 14px; overflow: hidden; }
    .feed-hdr { display: flex; align-items: center; gap: 10px; padding: 12px 14px; }
    .feed-av { width: 38px; height: 38px; border-radius: 50%; background: var(--brand-light); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: var(--brand-dark); flex-shrink: 0; }
    .feed-uname { font-size: 14px; font-weight: 600; color: var(--text); }
    .feed-meta { font-size: 12px; color: var(--text2); }
    .feed-lvl { font-size: 11px; background: var(--brand-light); color: var(--brand-dark); padding: 2px 8px; border-radius: 5px; font-weight: 600; }
    .feed-img { width: 100%; aspect-ratio: 4/3; background: var(--bg2); display: flex; align-items: center; justify-content: center; font-size: 56px; }
    .feed-actions { display: flex; gap: 16px; padding: 10px 14px 6px; }
    .action-btn { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--text2); cursor: pointer; border: none; background: none; -webkit-tap-highlight-color: transparent; }
    .action-btn.liked { color: #E24B4A; }
    .feed-caption { padding: 2px 14px 14px; font-size: 13px; color: var(--text); line-height: 1.5; }

    /* CHECKIN */
    .checkin-box { background: var(--brand-light); border-radius: 14px; padding: 16px; margin-bottom: 16px; }
    .checkin-box-title { font-size: 14px; font-weight: 600; color: var(--brand-dark); margin-bottom: 10px; }
    .form-select { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 15px; background: var(--bg); color: var(--text); margin-bottom: 10px; -webkit-appearance: none; }
    .btn-checkin { background: var(--brand); color: white; border: none; padding: 13px; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; }

    /* MAP */
    .map-box { background: #e8f5e8; border-radius: 14px; margin-bottom: 16px; overflow: hidden; position: relative; height: 210px; }
    .map-lines { position: absolute; inset: 0; background-image: linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px); background-size: 30px 30px; }
    .map-pin { position: absolute; font-size: 24px; transform: translateX(-50%) translateY(-100%); filter: drop-shadow(0 2px 4px rgba(0,0,0,0.25)); cursor: pointer; }
    .map-empty-msg { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
    .map-empty-msg span { font-size: 32px; }
    .map-empty-msg p { font-size: 13px; color: var(--text2); }

    /* HISTORY */
    .history-item { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-bottom: 1px solid var(--border); }
    .history-emoji { width: 38px; height: 38px; background: var(--brand-light); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .history-info { flex: 1; min-width: 0; }
    .history-name { font-size: 14px; font-weight: 500; color: var(--text); }
    .history-note { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-date { font-size: 11px; color: var(--text2); flex-shrink: 0; }

    /* SETTINGS */
    .settings-section { margin-bottom: 24px; }
    .settings-title { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; }
    .btn-logout { background: #FCEBEB; color: #A32D2D; border: none; padding: 13px; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; }

    /* UTILITIES */
    .section-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 14px; }
    .loading { text-align: center; padding: 40px 16px; color: var(--text2); font-size: 14px; }
    .empty-state { text-align: center; padding: 40px 16px; color: var(--text2); font-size: 14px; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

    /* TOAST */
    .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; padding: 11px 20px; border-radius: 22px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; white-space: nowrap; backdrop-filter: blur(8px); }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div id="app">
  <!-- HEADER -->
  <header class="hdr">
    <div class="hdr-brand">
      <div class="hdr-logo">FitSpot</div>
      <div class="hdr-claim">Entrena. Comparte. Conecta.</div>
    </div>
    <button class="hdr-avatar" id="avatarBtn" aria-label="Perfil">
      <i class="ti ti-user"></i>
    </button>
  </header>

  <!-- AUTH -->
  <div id="authWrap" style="display:none">
    <div class="auth-page">
      <div class="auth-logo">FitSpot</div>
      <div class="auth-claim">Entrena. Comparte. Conecta.</div>
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" onclick="switchAuth('login')">Iniciar sesión</button>
        <button class="auth-tab" id="tabReg" onclick="switchAuth('register')">Registrarse</button>
      </div>
      <div class="msg-error" id="authError"></div>
      <div class="msg-ok" id="authOk"></div>

      <div id="loginForm">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" id="loginEmail" type="email" placeholder="tu@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <input class="form-input" id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn-primary" id="btnLogin">Entrar</button>
        <button class="btn-ghost" onclick="switchAuth('register')">¿No tienes cuenta? Regístrate</button>
      </div>

      <div id="registerForm" style="display:none">
        <div class="form-group">
          <label class="form-label">Nombre completo</label>
          <input class="form-input" id="regName" type="text" placeholder="Tu nombre" autocomplete="name">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" id="regEmail" type="email" placeholder="tu@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <input class="form-input" id="regPass" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
        </div>
        <button class="btn-primary" id="btnRegister">Crear cuenta</button>
        <button class="btn-ghost" onclick="switchAuth('login')">¿Ya tienes cuenta? Inicia sesión</button>
      </div>
    </div>
  </div>

  <!-- PAGES -->
  <div id="page-explore" class="page active">
    <div class="section-title">Actividad reciente 🔥</div>
    <div id="feedList"><div class="loading">Cargando...</div></div>
  </div>

  <div id="page-checkin" class="page">
    <div class="section-title">Hacer Check-in 📍</div>
    <div class="checkin-box">
      <div class="checkin-box-title">¿Dónde has entrenado hoy?</div>
      <select class="form-select" id="checkinGym">
        <option value="">Selecciona un gimnasio...</option>
      </select>
      <input class="form-input" id="checkinNote" type="text" placeholder="Nota opcional (ej. PR en sentadilla 🏋️)" style="margin-bottom:10px">
      <button class="btn-checkin" id="btnCheckin">📍 Registrar check-in · +20 pts</button>
    </div>
    <div class="section-title">Mi mapa de entrenos</div>
    <div class="map-box" id="myMap">
      <div class="map-lines"></div>
      <div class="map-empty-msg" id="mapEmpty">
        <span>🗺️</span>
        <p>Tus check-ins aparecerán aquí</p>
      </div>
    </div>
    <div id="checkinHistory"></div>
  </div>

  <div id="page-profile" class="page">
    <div id="profileContent"><div class="loading">Cargando...</div></div>
  </div>

  <div id="page-settings" class="page">
    <div class="settings-section">
      <div class="settings-title">Editar perfil</div>
      <div class="form-group">
        <label class="form-label">Nombre completo</label>
        <input class="form-input" id="editName" type="text" autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label">Usuario</label>
        <input class="form-input" id="editUsername" type="text" placeholder="@usuario">
      </div>
      <div class="form-group">
        <label class="form-label">Ciudad</label>
        <input class="form-input" id="editCity" type="text" placeholder="Palma, Mallorca">
      </div>
      <div class="form-group">
        <label class="form-label">Bio</label>
        <input class="form-input" id="editBio" type="text" placeholder="CrossFitter desde 2019 🏋️">
      </div>
      <button class="btn-primary" id="btnSaveProfile">💾 Guardar perfil</button>
    </div>
    <button class="btn-logout" id="btnLogout">Cerrar sesión</button>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav" id="bottomNav" style="display:none">
    <button class="nav-item active" data-page="explore">
      <i class="ti ti-compass"></i>
      <span>Explorar</span>
    </button>
    <button class="nav-item" data-page="checkin">
      <i class="ti ti-map-pin"></i>
      <span>Check-in</span>
    </button>
    <button class="nav-item" data-page="profile">
      <i class="ti ti-user"></i>
      <span>Perfil</span>
    </button>
    <button class="nav-item" data-page="settings">
      <i class="ti ti-settings"></i>
      <span>Ajustes</span>
    </button>
  </nav>
</div>

<div class="toast" id="toastEl"></div>

<script>
  const SUPA_URL = 'https://tdybrmaekzodbfckjift.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkeWJybWFla3pvZGJmY2tqaWZ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMDUwODIsImV4cCI6MjA5NjU4MTA4Mn0.PmwSMHvBwtbAEuOk19LG2GVNnKSrgqmGGuBiQ5kqKN0';
  const { createClient } = supabase;
  const db = createClient(SUPA_URL, SUPA_KEY);

  let currentUser = null, profile = null, gyms = [], myCheckins = [], likedPosts = new Set();

  const LEVELS = [
    { name: 'Rookie',  icon: '🌱', min: 0,    max: 100  },
    { name: 'Athlete', icon: '⚡', min: 100,  max: 300  },
    { name: 'Pro',     icon: '🔥', min: 300,  max: 600  },
    { name: 'Elite',   icon: '💎', min: 600,  max: 1000 },
    { name: 'Legend',  icon: '👑', min: 1000, max: 99999 }
  ];
  const POINTS_INFO = [
    { action: 'Check-in en un gimnasio', pts: 20,  icon: '📍' },
    { action: 'Subir una foto',          pts: 15,  icon: '📸' },
    { action: 'Dejar una reseña',        pts: 25,  icon: '⭐' },
    { action: 'Recibir un like',         pts: 5,   icon: '❤️' },
    { action: 'Completar perfil',        pts: 50,  icon: '✅' }
  ];

  function getLevel(pts) { return [...LEVELS].reverse().find(l => pts >= l.min) || LEVELS[0]; }
  function getNext(pts)  { return LEVELS.find(l => pts < l.max) || LEVELS[LEVELS.length - 1]; }

  function toast(msg, ok = true) {
    const el = document.getElementById('toastEl');
    el.textContent = (ok ? '✓ ' : '✗ ') + msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  function showErr(msg) {
    const e = document.getElementById('authError');
    const s = document.getElementById('authOk');
    e.textContent = msg; e.style.display = ''; s.style.display = 'none';
  }
  function showOk(msg) {
    const e = document.getElementById('authError');
    const s = document.getElementById('authOk');
    s.textContent = msg; s.style.display = ''; e.style.display = 'none';
  }

  function switchAuth(mode) {
    document.getElementById('tabLogin').classList.toggle('active', mode === 'login');
    document.getElementById('tabReg').classList.toggle('active', mode === 'register');
    document.getElementById('loginForm').style.display   = mode === 'login'    ? '' : 'none';
    document.getElementById('registerForm').style.display = mode === 'register' ? '' : 'none';
    document.getElementById('authError').style.display = 'none';
    document.getElementById('authOk').style.display    = 'none';
  }

  function showAuth() {
    document.getElementById('authWrap').style.display  = '';
    document.getElementById('bottomNav').style.display = 'none';
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('avatarBtn').onclick = () => showAuth();
  }

  function showApp() {
    document.getElementById('authWrap').style.display  = 'none';
    document.getElementById('bottomNav').style.display = 'flex';
    document.getElementById('avatarBtn').onclick = () => showPage('profile');
    updateAvatarBtn();
    showPage('explore');
  }

  function updateAvatarBtn() {
    const btn = document.getElementById('avatarBtn');
    if (profile?.full_name) {
      const initials = profile.full_name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
      btn.textContent = initials;
    }
  }

  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.page === name));
    if (name === 'profile')  renderProfile();
    if (name === 'checkin')  initCheckin();
    if (name === 'explore')  loadFeed();
    if (name === 'settings') loadSettings();
  }

  document.getElementById('bottomNav').addEventListener('click', e => {
    const btn = e.target.closest('.nav-item');
    if (btn) showPage(btn.dataset.page);
  });

  // AUTH
  document.getElementById('btnLogin').addEventListener('click', async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const pass  = document.getElementById('loginPass').value;
    if (!email || !pass) { showErr('Rellena todos los campos'); return; }
    const btn = document.getElementById('btnLogin');
    btn.textContent = 'Entrando...'; btn.disabled = true;
    const { data, error } = await db.auth.signInWithPassword({ email, password: pass });
    btn.textContent = 'Entrar'; btn.disabled = false;
    if (error) { showErr(error.message); return; }
    currentUser = data.user;
    await loadProfile();
    showApp();
    toast('¡Bienvenido de nuevo! 👋');
  });

  document.getElementById('btnRegister').addEventListener('click', async () => {
    const name  = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass  = document.getElementById('regPass').value;
    if (!name || !email || !pass) { showErr('Rellena todos los campos'); return; }
    if (pass.length < 6) { showErr('La contraseña debe tener al menos 6 caracteres'); return; }
    const btn = document.getElementById('btnRegister');
    btn.textContent = 'Creando cuenta...'; btn.disabled = true;
    const { data, error } = await db.auth.signUp({
      email, password: pass,
      options: { data: { full_name: name } }
    });
    btn.textContent = 'Crear cuenta'; btn.disabled = false;
    if (error) { showErr(error.message); return; }
    currentUser = data.user;
    await new Promise(r => setTimeout(r, 1000));
    await loadProfile();
    showApp();
    toast('¡Bienvenido a FitSpot! 🎉');
  });

  document.getElementById('btnLogout').addEventListener('click', async () => {
    await db.auth.signOut();
    currentUser = null; profile = null;
    showAuth();
    toast('Sesión cerrada');
  });

  async function loadProfile() {
    if (!currentUser) return;
    const { data } = await db.from('profiles').select('*').eq('id', currentUser.id).single();
    profile = data;
  }

  async function addPoints(pts) {
    if (!profile) return;
    const newPts   = (profile.points || 0) + pts;
    const newLevel = getLevel(newPts).name;
    await db.from('profiles').update({ points: newPts, level: newLevel }).eq('id', currentUser.id);
    profile.points = newPts;
    profile.level  = newLevel;
  }

  // PROFILE
  function renderProfile() {
    const el = document.getElementById('profileContent');
    if (!profile) { el.innerHTML = '<div class="loading">Cargando...</div>'; return; }
    const pts      = profile.points || 0;
    const level    = getLevel(pts);
    const next     = getNext(pts);
    const progress = Math.min(100, Math.round(((pts - level.min) / (next.max - level.min)) * 100));
    const initials = (profile.full_name || profile.username || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);

    el.innerHTML = `
      <div class="profile-hero">
        <div class="profile-avatar-big">${initials}</div>
        <div class="profile-name">${profile.full_name || profile.username}</div>
        <div class="profile-handle">@${profile.username}${profile.city ? ' · ' + profile.city : ''}</div>
        ${profile.bio ? `<div class="profile-bio-text">${profile.bio}</div>` : ''}
        <div class="level-pill">${level.icon} ${level.name} · ${pts} pts</div>
      </div>
      <div class="progress-section">
        <div class="progress-labels">
          <span>${level.name}</span>
          <span>${pts} / ${next.max} pts → ${next.name} ${next.icon}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      </div>
      <div class="stats-row">
        <div class="stat-cell"><div class="stat-num">${myCheckins.length}</div><div class="stat-lbl">Check-ins</div></div>
        <div class="stat-cell"><div class="stat-num">${pts}</div><div class="stat-lbl">Puntos</div></div>
        <div class="stat-cell"><div class="stat-num">${level.icon}</div><div class="stat-lbl">${level.name}</div></div>
      </div>
      <div style="padding: 0 0 0 0">
        <div class="card">
          <div class="card-title">¿Cómo ganar puntos?</div>
          ${POINTS_INFO.map(p => `
            <div class="pts-row">
              <span class="pts-action"><span>${p.icon}</span>${p.action}</span>
              <span class="pts-val">+${p.pts}</span>
            </div>`).join('')}
        </div>
      </div>`;
  }

  // CHECKIN
  async function initCheckin() {
    if (!gyms.length) {
      const { data } = await db.from('gyms').select('*').eq('is_approved', true).order('name');
      gyms = data || [];
      const sel = document.getElementById('checkinGym');
      sel.innerHTML = '<option value="">Selecciona un gimnasio...</option>' +
        gyms.map(g => `<option value="${g.id}">${g.emoji || '🏋️'} ${g.name}</option>`).join('');
    }
    if (currentUser) {
      const { data } = await db.from('checkins')
        .select('*, gyms(name, emoji)')
        .eq('user_id', currentUser.id)
        .order('created_at', { ascending: false });
      myCheckins = data || [];
      renderCheckinHistory();
      renderMap();
    }
  }

  document.getElementById('btnCheckin').addEventListener('click', async () => {
    if (!currentUser) { toast('Inicia sesión primero', false); showAuth(); return; }
    const gymId = document.getElementById('checkinGym').value;
    const note  = document.getElementById('checkinNote').value.trim();
    if (!gymId) { toast('Selecciona un gimnasio', false); return; }
    const btn = document.getElementById('btnCheckin');
    btn.textContent = 'Registrando...'; btn.disabled = true;
    const { error } = await db.from('checkins').insert({ user_id: currentUser.id, gym_id: gymId, note: note || null });
    btn.textContent = '📍 Registrar check-in · +20 pts'; btn.disabled = false;
    if (error) { toast('Error: ' + error.message, false); return; }
    await addPoints(20);
    document.getElementById('checkinNote').value = '';
    document.getElementById('checkinGym').value  = '';
    await initCheckin();
    toast('¡Check-in registrado! +20 puntos 🎉');
  });

  function renderMap() {
    const map   = document.getElementById('myMap');
    const empty = document.getElementById('mapEmpty');
    map.querySelectorAll('.map-pin').forEach(p => p.remove());
    if (!myCheckins.length) { empty.style.display = 'flex'; return; }
    empty.style.display = 'none';
    const positions = [[25,30],[58,42],[18,62],[72,33],[44,68],[65,18],[35,52],[80,58],[12,42],[52,22]];
    myCheckins.slice(0, 10).forEach((c, i) => {
      const pin = document.createElement('div');
      pin.className = 'map-pin';
      pin.style.left  = positions[i][0] + '%';
      pin.style.top   = positions[i][1] + '%';
      pin.title       = c.gyms?.name || 'Gym';
      pin.textContent = c.gyms?.emoji || '📍';
      map.appendChild(pin);
    });
  }

  function renderCheckinHistory() {
    const el = document.getElementById('checkinHistory');
    if (!myCheckins.length) {
      el.innerHTML = '<div class="empty-state">¡Aún no tienes check-ins!<br>Empieza a entrenar 💪</div>';
      return;
    }
    el.innerHTML = '<div class="section-title" style="margin-top:4px">Mis últimos entrenos</div>' +
      myCheckins.slice(0, 8).map(c => `
        <div class="history-item">
          <div class="history-emoji">${c.gyms?.emoji || '📍'}</div>
          <div class="history-info">
            <div class="history-name">${c.gyms?.name || 'Gimnasio'}</div>
            ${c.note ? `<div class="history-note">${c.note}</div>` : ''}
          </div>
          <div class="history-date">${new Date(c.created_at).toLocaleDateString('es-ES', { day: 'numeric', month: 'short' })}</div>
        </div>`).join('');
  }

  // FEED (mock hasta implementar fotos reales)
  function loadFeed() {
    const mock = [
      { user: 'maria_fit',  level: 'Elite 💎',   gym: 'CrossFit Palma',       emoji: '🏋️', caption: 'WOD increíble hoy. PR en Clean & Jerk 🏋️‍♀️',                likes: 24, time: 'hace 2h' },
      { user: 'toni_run',   level: 'Pro 🔥',     gym: 'Swim Club Palma',      emoji: '🏊', caption: 'Primer entreno en la piscina. El agua estaba perfecta 💙',   likes: 18, time: 'hace 5h' },
      { user: 'sara_yoga',  level: 'Athlete ⚡',  gym: 'Yoga Mallorca Studio', emoji: '🧘', caption: 'Sesión de meditación matutina. El mejor comienzo del día ☀️', likes: 31, time: 'hace 1d' },
    ];
    document.getElementById('feedList').innerHTML = mock.map((f, i) => `
      <div class="feed-card">
        <div class="feed-hdr">
          <div class="feed-av">${f.user[0].toUpperCase()}</div>
          <div style="flex:1">
            <div class="feed-uname">@${f.user} <span class="feed-lvl">${f.level}</span></div>
            <div class="feed-meta">${f.emoji} ${f.gym} · ${f.time}</div>
          </div>
        </div>
        <div class="feed-img">${f.emoji}</div>
        <div class="feed-actions">
          <button class="action-btn" id="lb${i}" onclick="toggleLike(${i},${f.likes})">
            <i class="ti ti-heart"></i> <span id="lc${i}">${f.likes}</span>
          </button>
          <button class="action-btn"><i class="ti ti-message-circle"></i> Comentar</button>
          <button class="action-btn"><i class="ti ti-share"></i></button>
        </div>
        <div class="feed-caption"><strong>@${f.user}</strong> ${f.caption}</div>
      </div>`).join('');
  }

  function toggleLike(i, base) {
    if (!currentUser) { toast('Inicia sesión para dar likes', false); return; }
    const btn = document.getElementById('lb' + i);
    const cnt = document.getElementById('lc' + i);
    if (likedPosts.has(i)) {
      likedPosts.delete(i); cnt.textContent = base; btn.classList.remove('liked');
    } else {
      likedPosts.add(i); cnt.textContent = base + 1; btn.classList.add('liked');
    }
  }

  // SETTINGS
  function loadSettings() {
    if (!profile) return;
    document.getElementById('editName').value     = profile.full_name || '';
    document.getElementById('editUsername').value = profile.username  || '';
    document.getElementById('editCity').value     = profile.city      || '';
    document.getElementById('editBio').value      = profile.bio       || '';
  }

  document.getElementById('btnSaveProfile').addEventListener('click', async () => {
    if (!currentUser) return;
    const wasComplete = profile?.profile_completed;
    const data = {
      full_name:         document.getElementById('editName').value.trim(),
      username:          document.getElementById('editUsername').value.trim(),
      city:              document.getElementById('editCity').value.trim(),
      bio:               document.getElementById('editBio').value.trim(),
      profile_completed: true
    };
    const btn = document.getElementById('btnSaveProfile');
    btn.textContent = 'Guardando...'; btn.disabled = true;
    const { error } = await db.from('profiles').update(data).eq('id', currentUser.id);
    btn.textContent = '💾 Guardar perfil'; btn.disabled = false;
    if (error) { toast('Error: ' + error.message, false); return; }
    Object.assign(profile, data);
    updateAvatarBtn();
    if (!wasComplete) { await addPoints(50); toast('¡Perfil completado! +50 puntos 🎉'); }
    else toast('Perfil actualizado ✓');
  });

  // INIT
  (async () => {
    const { data: { session } } = await db.auth.getSession();
    if (session) {
      currentUser = session.user;
      await loadProfile();
      showApp();
    } else {
      showAuth();
    }
  })();
</script>
</body>
</html>
