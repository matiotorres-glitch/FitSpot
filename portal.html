<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FitSpot — Portal de Gimnasios</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#fff;color:#111;max-width:480px;margin:0 auto;min-height:100vh}
.hdr{background:#D85A30;color:#fff;padding:14px 16px}
.hdr-top{display:flex;align-items:center;justify-content:space-between}
.hdr-logo{font-size:16px;font-weight:600}
.hdr-sub{font-size:12px;opacity:.85;margin-top:2px}
.hdr-badge{font-size:11px;background:rgba(255,255,255,.25);padding:3px 8px;border-radius:4px}
.nav{display:flex;background:#f8f8f8;border-bottom:1px solid #eee}
.tab{flex:1;padding:11px 6px;font-size:13px;cursor:pointer;color:#888;border-bottom:2px solid transparent;text-align:center;background:none;border-left:none;border-right:none;border-top:none}
.tab.active{color:#D85A30;border-bottom-color:#D85A30;font-weight:600}
.body{padding:16px}
.fg{margin-bottom:16px}
.lbl{font-size:12px;font-weight:600;color:#888;margin-bottom:4px;display:block}
.sel{width:100%;padding:11px 12px;border:1.5px solid #eee;border-radius:12px;font-size:15px;background:#fff;color:#111;-webkit-appearance:none}
.sel:focus{outline:none;border-color:#D85A30}
.info-card{background:#f8f8f8;border-radius:14px;padding:14px;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.info-emoji{font-size:30px}
.info-name{font-size:15px;font-weight:600}
.info-cats{font-size:12px;color:#888;margin-top:2px}
.st{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.tag-free{font-size:11px;background:#EAF3DE;color:#3B6D11;padding:2px 8px;border-radius:5px;font-weight:600}
.tag-lock{font-size:11px;background:#FAEEDA;color:#854F0B;padding:2px 8px;border-radius:5px;font-weight:600}
.fgroup{margin-bottom:14px}
.flabel{font-size:12px;font-weight:600;color:#888;margin-bottom:5px;display:block}
.inp{width:100%;padding:11px 13px;border:1.5px solid #eee;border-radius:12px;font-size:15px;background:#fff;color:#111;-webkit-appearance:none}
.inp:focus{outline:none;border-color:#D85A30}
.inp.ro{background:#f8f8f8;color:#888}
.ta{resize:vertical;min-height:65px}
.lockrow{display:flex;align-items:center;gap:8px}
.lockrow .inp{flex:1}
.breq{flex-shrink:0;display:flex;align-items:center;gap:4px;font-size:12px;padding:11px 12px;border-radius:12px;border:1px solid #F0997B;color:#993C1D;background:#FAECE7;cursor:pointer;white-space:nowrap}
.divider{border:none;border-top:1px solid #eee;margin:20px 0}
.pricelist{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.pricerow{display:flex;gap:8px;align-items:center}
.pricerow .inp{flex:1}
.bdel{width:32px;height:32px;border-radius:8px;border:1px solid #F09595;background:#FCEBEB;color:#A32D2D;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.baddprice{display:inline-flex;align-items:center;gap:4px;font-size:13px;padding:7px 14px;border-radius:10px;border:1px solid #D85A30;color:#D85A30;background:#FAECE7;cursor:pointer}
.btn{background:#D85A30;color:#fff;border:none;padding:13px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin-top:6px}
.pend{background:#fff;border:1px solid #eee;border-radius:14px;padding:14px;margin-bottom:10px}
.pend-field{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.4px}
.pend-vals{display:flex;gap:8px;align-items:center;margin-top:6px;flex-wrap:wrap}
.val-old{font-size:13px;color:#888;text-decoration:line-through}
.val-new{font-size:13px;font-weight:600}
.statusb{display:inline-flex;font-size:11px;padding:2px 8px;border-radius:5px;font-weight:600;margin-top:8px}
.s-p{background:#FAEEDA;color:#854F0B}.s-a{background:#EAF3DE;color:#3B6D11}.s-r{background:#FCEBEB;color:#A32D2D}
.pend-date{font-size:11px;color:#888;margin-top:4px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:360px}
.modal-title{font-size:15px;font-weight:600;margin-bottom:6px}
.modal-sub{font-size:13px;color:#888;margin-bottom:14px;line-height:1.5}
.modal-actions{display:flex;gap:8px;margin-top:14px}
.bcancel{flex:1;background:#f8f8f8;border:1px solid #eee;color:#111;padding:10px;border-radius:10px;font-size:14px;cursor:pointer}
.bconfirm{flex:1;background:#D85A30;color:#fff;border:none;padding:10px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:11px 20px;border-radius:22px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
.loading{text-align:center;padding:30px;color:#888;font-size:13px}
.empty{text-align:center;padding:30px;color:#888;font-size:13px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <span class="hdr-logo">FitSpot <span style="opacity:.7;font-weight:400">· Portal</span></span>
    <span class="hdr-badge">Gimnasios</span>
  </div>
  <div class="hdr-sub">Gestiona la información de tu centro</div>
</div>

<div class="nav">
  <button class="tab active" onclick="switchTab('edit')">Mi info</button>
  <button class="tab" onclick="switchTab('prices')">Precios</button>
  <button class="tab" onclick="switchTab('pending')">Solicitudes</button>
</div>

<div class="body">
  <div class="fg">
    <label class="lbl">Selecciona tu gimnasio</label>
    <select class="sel" id="gymSel" onchange="onGymChange()">
      <option value="">Cargando...</option>
    </select>
  </div>

  <div id="gymCard" style="display:none"></div>

  <div id="tab-edit">
    <div id="editContent"><div class="loading">Selecciona un gimnasio</div></div>
  </div>

  <div id="tab-prices" style="display:none">
    <div class="st">Precios <span class="tag-free"><i class="ti ti-check"></i> Edición libre</span></div>
    <div class="pricelist" id="priceList"></div>
    <button class="baddprice" onclick="addPriceRow()"><i class="ti ti-plus"></i> Añadir precio</button>
    <button class="btn" onclick="savePrices()">💾 Guardar precios</button>
  </div>

  <div id="tab-pending" style="display:none">
    <div class="st">Mis solicitudes de cambio</div>
    <div id="pendingList"><div class="loading">Selecciona un gimnasio</div></div>
  </div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-sub" id="modalSub"></div>
    <label class="flabel" id="modalLabel"></label>
    <input class="inp" id="modalInput" placeholder="" style="margin-bottom:6px">
    <div class="modal-actions">
      <button class="bcancel" onclick="closeModal()">Cancelar</button>
      <button class="bconfirm" onclick="submitRequest()">Enviar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SURL='https://tdybrmaekzodbfckjift.supabase.co';
var SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkeWJybWFla3pvZGJmY2tqaWZ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMDUwODIsImV4cCI6MjA5NjU4MTA4Mn0.PmwSMHvBwtbAEuOk19LG2GVNnKSrgqmGGuBiQ5kqKN0';
var db=supabase.createClient(SURL,SKEY);

var gyms=[],prices=[],changes=[];
var currentGym=null;
var modalField=null,modalOldVal=null;

function showToast(msg,ok){
  var el=document.getElementById('toast');
  el.textContent=(ok!==false?'✓ ':'✗ ')+msg;
  el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');},3000);
}

function switchTab(name){
  document.querySelectorAll('.tab').forEach(function(t,i){
    var tabs=['edit','prices','pending'];
    t.classList.toggle('active',tabs[i]===name);
  });
  ['edit','prices','pending'].forEach(function(t){
    document.getElementById('tab-'+t).style.display=t===name?'':'none';
  });
  if(name==='pending')renderPending();
  if(name==='prices')renderPrices();
}

function onGymChange(){
  var id=document.getElementById('gymSel').value;
  currentGym=gyms.find(function(g){return g.id===id;})||null;
  renderGymCard();
  renderEditTab();
  renderPrices();
  renderPending();
}

function renderGymCard(){
  var el=document.getElementById('gymCard');
  if(!currentGym){el.style.display='none';return;}
  el.style.display='';
  el.innerHTML='<div class="info-card"><div class="info-emoji">'+(currentGym.emoji||'🏋️')+'</div><div><div class="info-name">'+currentGym.name+'</div><div class="info-cats">'+(currentGym.category||[]).join(' · ')+'</div></div></div>';
}

function renderEditTab(){
  var el=document.getElementById('editContent');
  if(!currentGym){el.innerHTML='<div class="loading">Selecciona un gimnasio</div>';return;}
  var g=currentGym;
  el.innerHTML=
    '<div class="st">Datos libres <span class="tag-free"><i class="ti ti-check"></i> Edición libre</span></div>'+
    '<div class="fgroup"><label class="flabel">Horario</label><input class="inp" id="fHours" value="'+(g.open_hours||'')+'" placeholder="6:00–22:00"></div>'+
    '<div class="fgroup"><label class="flabel">Teléfono</label><input class="inp" id="fPhone" value="'+(g.phone||'')+'" placeholder="+34 971..."></div>'+
    '<div class="fgroup"><label class="flabel">Web</label><input class="inp" id="fWeb" value="'+(g.website||'')+'" placeholder="miweb.com"></div>'+
    '<div class="fgroup"><label class="flabel">Descripción</label><textarea class="inp ta" id="fDesc">'+(g.description||'')+'</textarea></div>'+
    '<button class="btn" onclick="saveFreeFields()">💾 Guardar cambios</button>'+
    '<hr class="divider">'+
    '<div class="st">Datos restringidos <span class="tag-lock"><i class="ti ti-lock"></i> Requiere aprobación</span></div>'+
    '<p style="font-size:13px;color:#888;margin-bottom:14px;line-height:1.5">Estos campos requieren revisión. Te avisaremos cuando se aprueben.</p>'+
    '<div class="fgroup"><label class="flabel">Nombre del gimnasio</label><div class="lockrow"><input class="inp ro" value="'+g.name+'" readonly><button class="breq" onclick="openModal(\'name\',\'Nombre del gimnasio\',\''+g.name.replace(/'/g,"\\'")+'\',\'Nuevo nombre\')"><i class="ti ti-send"></i> Solicitar</button></div></div>'+
    '<div class="fgroup"><label class="flabel">Dirección</label><div class="lockrow"><input class="inp ro" value="'+(g.address||'Sin dirección')+'" readonly><button class="breq" onclick="openModal(\'address\',\'Dirección\',\''+(g.address||'').replace(/'/g,"\\'")+'\',\'Nueva dirección\')"><i class="ti ti-send"></i> Solicitar</button></div></div>'+
    '<div class="fgroup"><label class="flabel">Categorías</label><div class="lockrow"><input class="inp ro" value="'+(g.category||[]).join(', ')+'" readonly><button class="breq" onclick="openModal(\'category\',\'Categorías\',\''+(g.category||[]).join(', ')+'\',\'ej. CrossFit, Yoga, Hyrox\')"><i class="ti ti-send"></i> Solicitar</button></div></div>';
}

function saveFreeFields(){
  if(!currentGym)return;
  var data={
    open_hours:document.getElementById('fHours').value.trim()||null,
    phone:document.getElementById('fPhone').value.trim()||null,
    website:document.getElementById('fWeb').value.trim()||null,
    description:document.getElementById('fDesc').value.trim()||null
  };
  db.from('gyms').update(data).eq('id',currentGym.id).then(function(r){
    if(r.error){showToast('Error: '+r.error.message,false);return;}
    Object.assign(currentGym,data);
    showToast('Cambios guardados');
  });
}

function renderPrices(){
  if(!currentGym){document.getElementById('priceList').innerHTML='';return;}
  var gymPrices=prices.filter(function(p){return p.gym_id===currentGym.id;});
  var list=document.getElementById('priceList');
  list.innerHTML='';
  if(gymPrices.length)gymPrices.forEach(function(p){addPriceRow(p.label,p.value);});
  else addPriceRow();
}

function addPriceRow(label,value){
  var row=document.createElement('div');
  row.className='pricerow';
  row.innerHTML='<input class="inp" placeholder="Drop-in" value="'+(label||'')+'" style="flex:1.4"><input class="inp" placeholder="18€" value="'+(value||'')+'" style="flex:0.8"><button class="bdel" onclick="this.closest(\'.pricerow\').remove()"><i class="ti ti-x"></i></button>';
  document.getElementById('priceList').appendChild(row);
}

function savePrices(){
  if(!currentGym){showToast('Selecciona un gimnasio primero',false);return;}
  var rows=document.querySelectorAll('#priceList .pricerow');
  var newPrices=[];
  rows.forEach(function(r){
    var ins=r.querySelectorAll('input');
    if(ins[0].value.trim()&&ins[1].value.trim())newPrices.push({label:ins[0].value.trim(),value:ins[1].value.trim()});
  });
  db.from('prices').delete().eq('gym_id',currentGym.id).then(function(){
    var done=function(){
      prices=prices.filter(function(p){return p.gym_id!==currentGym.id;});
      newPrices.forEach(function(p){prices.push(Object.assign({},p,{gym_id:currentGym.id}));});
      showToast('Precios actualizados');
    };
    if(!newPrices.length){done();return;}
    db.from('prices').insert(newPrices.map(function(p){return Object.assign({},p,{gym_id:currentGym.id});})).then(function(r){
      if(r.error){showToast('Error: '+r.error.message,false);return;}
      done();
    });
  });
}

function renderPending(){
  var el=document.getElementById('pendingList');
  if(!currentGym){el.innerHTML='<div class="loading">Selecciona un gimnasio</div>';return;}
  var gymChanges=changes.filter(function(c){return c.gym_id===currentGym.id;});
  if(!gymChanges.length){el.innerHTML='<div class="empty">No tienes solicitudes enviadas</div>';return;}
  var fieldNames={name:'Nombre',address:'Dirección',category:'Categorías'};
  el.innerHTML=gymChanges.map(function(c){
    var sCls=c.status==='pending'?'s-p':c.status==='approved'?'s-a':'s-r';
    var sTxt=c.status==='pending'?'Pendiente':c.status==='approved'?'Aprobado':'Rechazado';
    return '<div class="pend"><div class="pend-field">'+(fieldNames[c.field]||c.field)+'</div><div class="pend-vals"><span class="val-old">'+(c.old_value||'—')+'</span><span>→</span><span class="val-new">'+c.new_value+'</span></div><div><span class="statusb '+sCls+'">'+sTxt+'</span></div><div class="pend-date">'+new Date(c.created_at).toLocaleDateString('es-ES',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})+'</div></div>';
  }).join('');
}

function openModal(field,fieldName,oldVal,placeholder){
  modalField=field;
  modalOldVal=oldVal;
  document.getElementById('modalTitle').textContent='Solicitar cambio: '+fieldName;
  document.getElementById('modalSub').textContent='Tu solicitud será revisada. Te avisaremos cuando se apruebe o rechace.';
  document.getElementById('modalLabel').textContent='Nuevo valor para '+fieldName.toLowerCase();
  document.getElementById('modalInput').placeholder=placeholder;
  document.getElementById('modalInput').value='';
  document.getElementById('modal').classList.add('open');
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
  modalField=null;modalOldVal=null;
}

function submitRequest(){
  if(!currentGym||!modalField)return;
  var newVal=document.getElementById('modalInput').value.trim();
  if(!newVal){showToast('Escribe el nuevo valor',false);return;}
  db.from('gym_change_requests').insert({gym_id:currentGym.id,field:modalField,old_value:modalOldVal,new_value:newVal,status:'pending'}).select().then(function(r){
    if(r.error){showToast('Error: '+r.error.message,false);return;}
    if(r.data&&r.data[0])changes.unshift(r.data[0]);
    closeModal();
    showToast('Solicitud enviada correctamente');
    switchTab('pending');
  });
}

function init(){
  Promise.all([
    db.from('gyms').select('*').eq('is_approved',true).order('name'),
    db.from('prices').select('*'),
    db.from('gym_change_requests').select('*').order('created_at',{ascending:false})
  ]).then(function(res){
    gyms=res[0].data||[];
    prices=res[1].data||[];
    changes=res[2].data||[];
    var sel=document.getElementById('gymSel');
    sel.innerHTML='<option value="">— Selecciona tu gimnasio —</option>'+gyms.map(function(g){return '<option value="'+g.id+'">'+(g.emoji||'🏋️')+' '+g.name+'</option>';}).join('');
  }).catch(function(e){
    document.getElementById('gymSel').innerHTML='<option>Error cargando datos</option>';
    alert('Error: '+(e.message||e));
  });
}

init();
</script>
</body>
</html>
