<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FitSpot — Portal de Gimnasios</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#fff;color:#111;max-width:480px;margin:0 auto;min-height:100vh}
/* LOGIN */
#loginPage{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px}
.logo{font-size:36px;font-weight:700;color:#D85A30;text-align:center}
.logo-sub{font-size:13px;color:#888;margin:4px 0 32px;text-align:center}
.box{width:100%;background:#f8f8f8;border-radius:16px;padding:24px}
.box-title{font-size:16px;font-weight:600;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.lbl{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.3px;display:block;margin-bottom:5px}
.inp{width:100%;padding:12px 14px;border:1.5px solid #eee;border-radius:12px;font-size:15px;background:#fff;color:#111;-webkit-appearance:none;display:block;margin-bottom:14px}
.inp:focus{outline:none;border-color:#D85A30}
.btn{background:#D85A30;color:#fff;border:none;padding:13px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;width:100%}
.err-msg{background:#FCEBEB;color:#A32D2D;border-radius:10px;padding:11px 14px;font-size:13px;margin-bottom:14px;display:none}
/* APP */
#portalApp{display:none}
.hdr{background:#D85A30;color:#fff;padding:14px 16px}
.hdr-top{display:flex;align-items:center;justify-content:space-between}
.hdr-logo{font-size:16px;font-weight:600}
.hdr-sub{font-size:12px;opacity:.85;margin-top:2px}
.btn-sm{font-size:12px;background:rgba(255,255,255,.2);border:none;color:#fff;padding:6px 12px;border-radius:8px;cursor:pointer}
.nav{display:flex;background:#f8f8f8;border-bottom:1px solid #eee}
.tab{flex:1;padding:11px 6px;font-size:13px;cursor:pointer;color:#888;border-bottom:2px solid transparent;text-align:center;background:none;border-left:none;border-right:none;border-top:none}
.tab.active{color:#D85A30;border-bottom-color:#D85A30;font-weight:600}
.body{padding:16px}
.info-card{background:#f8f8f8;border-radius:14px;padding:14px;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.info-emoji{font-size:30px}
.info-name{font-size:15px;font-weight:600}
.info-cats{font-size:12px;color:#888;margin-top:2px}
.st{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.tag-free{font-size:11px;background:#EAF3DE;color:#3B6D11;padding:2px 8px;border-radius:5px;font-weight:600}
.tag-lock{font-size:11px;background:#FAEEDA;color:#854F0B;padding:2px 8px;border-radius:5px;font-weight:600}
.fgroup{margin-bottom:14px}
.flabel{font-size:12px;font-weight:600;color:#888;margin-bottom:5px;display:block}
.fld{width:100%;padding:11px 13px;border:1.5px solid #eee;border-radius:12px;font-size:15px;background:#fff;color:#111;-webkit-appearance:none}
.fld:focus{outline:none;border-color:#D85A30}
.fld.ro{background:#f8f8f8;color:#888}
.ta{resize:vertical;min-height:65px}
.lockrow{display:flex;align-items:center;gap:8px}
.lockrow .fld{flex:1}
.breq{flex-shrink:0;display:flex;align-items:center;gap:4px;font-size:12px;padding:11px 12px;border-radius:12px;border:1px solid #F0997B;color:#993C1D;background:#FAECE7;cursor:pointer;white-space:nowrap}
.divider{border:none;border-top:1px solid #eee;margin:20px 0}
.pricelist{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.pricerow{display:flex;gap:8px;align-items:center}
.pricerow .fld{flex:1}
.bdel{width:32px;height:32px;border-radius:8px;border:1px solid #F09595;background:#FCEBEB;color:#A32D2D;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.baddprice{display:inline-flex;align-items:center;gap:4px;font-size:13px;padding:7px 14px;border-radius:10px;border:1px solid #D85A30;color:#D85A30;background:#FAECE7;cursor:pointer}
.cover-preview{width:100%;height:160px;border-radius:14px;object-fit:cover;margin-bottom:10px;display:none}
.cover-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:#fff;border:1.5px dashed #D85A30;border-radius:14px;padding:16px;cursor:pointer;color:#993C1D;font-size:14px;font-weight:500;margin-bottom:14px}
.gym-photo-item{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden}
.gym-photo-item img{width:100%;height:100%;object-fit:cover;display:block}
.gym-photo-del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);border:none;color:#fff;width:24px;height:24px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px}
.pend{background:#fff;border:1px solid #eee;border-radius:14px;padding:14px;margin-bottom:10px}
.pend-field{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.4px}
.pend-vals{display:flex;gap:8px;align-items:center;margin-top:6px;flex-wrap:wrap}
.val-old{font-size:13px;color:#888;text-decoration:line-through}
.val-new{font-size:13px;font-weight:600}
.statusb{display:inline-flex;font-size:11px;padding:2px 8px;border-radius:5px;font-weight:600;margin-top:8px}
.s-p{background:#FAEEDA;color:#854F0B}.s-a{background:#EAF3DE;color:#3B6D11}.s-r{background:#FCEBEB;color:#A32D2D}
.pend-date{font-size:11px;color:#888;margin-top:4px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:360px}
.modal-title{font-size:15px;font-weight:600;margin-bottom:6px}
.modal-sub{font-size:13px;color:#888;margin-bottom:14px;line-height:1.5}
.modal-actions{display:flex;gap:8px;margin-top:14px}
.bcancel{flex:1;background:#f8f8f8;border:1px solid #eee;color:#111;padding:10px;border-radius:10px;font-size:14px;cursor:pointer}
.bconfirm{flex:1;background:#D85A30;color:#fff;border:none;padding:10px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:11px 20px;border-radius:22px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
.loading{text-align:center;padding:30px;color:#888;font-size:13px}
.empty{text-align:center;padding:30px;color:#888;font-size:13px}
.noaccess{text-align:center;padding:60px 24px}
.noaccess i{font-size:40px;color:#D85A30}
.noaccess p{font-size:14px;color:#888;margin-top:12px;line-height:1.5}
</style>
</head>
<body>

<div id="loginPage">
  <div class="logo">FitSpot</div>
  <div class="logo-sub">Portal de gimnasios</div>
  <div class="box">
    <div class="box-title"><i class="ti ti-building"></i> Acceso de gimnasio</div>
    <div class="err-msg" id="loginErr"></div>
    <label class="lbl">Email</label>
    <input class="inp" id="loginEmail" type="email" placeholder="tu@gimnasio.com" autocomplete="email">
    <label class="lbl">Contraseña</label>
    <input class="inp" id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" onclick="doLogin()">Entrar al portal</button>
  </div>
</div>

<div id="portalApp">
  <div class="hdr">
    <div class="hdr-top">
      <span class="hdr-logo">FitSpot <span style="opacity:.7;font-weight:400">· Portal</span></span>
      <button class="btn-sm" onclick="doLogout()">Salir</button>
    </div>
    <div class="hdr-sub" id="hdrGymName">Cargando...</div>
  </div>

  <div class="nav">
    <button class="tab active" onclick="switchTab('edit')">Mi info</button>
    <button class="tab" onclick="switchTab('prices')">Precios</button>
    <button class="tab" onclick="switchTab('photos')">Fotos</button>
    <button class="tab" onclick="switchTab('pending')">Solicitudes</button>
  </div>

  <div class="body">
    <div id="gymCard"></div>
    <div id="noAccessMsg" style="display:none" class="noaccess">
      <i class="ti ti-alert-circle"></i>
      <p>Esta cuenta no está vinculada a ningún gimnasio todavía.<br>Contacta con el administrador de FitSpot.</p>
    </div>

    <div id="tab-edit"><div id="editContent"><div class="loading">Cargando...</div></div></div>

    <div id="tab-prices" style="display:none">
      <div class="st">Precios <span class="tag-free"><i class="ti ti-check"></i> Edición libre</span></div>
      <div class="pricelist" id="priceList"></div>
      <button class="baddprice" onclick="addPriceRow()"><i class="ti ti-plus"></i> Añadir precio</button>
      <button class="btn" onclick="savePrices()" style="margin-top:14px">💾 Guardar precios</button>
    </div>

    <div id="tab-photos" style="display:none">
      <div class="st">Fotos <span class="tag-free"><i class="ti ti-check"></i> Edición libre</span></div>
      <div style="display:flex;gap:6px;margin-bottom:14px">
        <button class="fld" id="btnPortalOfficial" onclick="setPortalPhotoTab('official')" style="flex:1;padding:8px;cursor:pointer;background:#FAECE7;color:#993C1D;border:1px solid #D85A30;font-weight:600;border-radius:10px;font-size:13px">Mis fotos oficiales</button>
        <button class="fld" id="btnPortalCommunity" onclick="setPortalPhotoTab('community')" style="flex:1;padding:8px;cursor:pointer;background:#fff;color:#888;border:1px solid #eee;border-radius:10px;font-size:13px">Comunidad</button>
      </div>
      <div id="portalPhotoTabContent"></div>
    </div>

    <div id="tab-pending" style="display:none">
      <div class="st">Mis solicitudes de cambio</div>
      <div id="pendingList"><div class="loading">Cargando...</div></div>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-sub" id="modalSub"></div>
    <label class="flabel" id="modalLabel"></label>
    <input class="fld" id="modalInput" placeholder="" style="margin-bottom:6px">
    <div class="modal-actions">
      <button class="bcancel" onclick="closeModal()">Cancelar</button>
      <button class="bconfirm" onclick="submitRequest()">Enviar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SURL='https://tdybrmaekzodbfckjift.supabase.co';
var SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkeWJybWFla3pvZGJmY2tqaWZ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMDUwODIsImV4cCI6MjA5NjU4MTA4Mn0.PmwSMHvBwtbAEuOk19LG2GVNnKSrgqmGGuBiQ5kqKN0';
var db=supabase.createClient(SURL,SKEY);

var currentUser=null,currentGym=null,prices=[],changes=[];
var modalField=null,modalOldVal=null;

function showToast(msg,ok){
  var el=document.getElementById('toast');
  el.textContent=(ok!==false?'✓ ':'✗ ')+msg;
  el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');},3000);
}

function showErr(msg){
  var e=document.getElementById('loginErr');
  e.textContent=msg;e.style.display='block';
}

function doLogin(){
  var email=document.getElementById('loginEmail').value.trim();
  var pass=document.getElementById('loginPass').value;
  if(!email||!pass){showErr('Rellena todos los campos');return;}
  document.getElementById('loginErr').style.display='none';
  db.auth.signInWithPassword({email:email,password:pass}).then(function(r){
    if(r.error){showErr(r.error.message);return;}
    currentUser=r.data.user;
    enterPortal();
  });
}

function doLogout(){
  db.auth.signOut().then(function(){
    currentUser=null;currentGym=null;
    document.getElementById('portalApp').style.display='none';
    document.getElementById('loginPage').style.display='flex';
    document.getElementById('loginEmail').value='';
    document.getElementById('loginPass').value='';
  });
}

function enterPortal(){
  document.getElementById('loginPage').style.display='none';
  document.getElementById('portalApp').style.display='block';
  loadGymData();
}

function loadGymData(){
  db.from('gym_owners').select('*,gyms(*)').eq('id',currentUser.id).single().then(function(r){
    if(r.error||!r.data||!r.data.gyms){
      document.getElementById('noAccessMsg').style.display='block';
      document.getElementById('tab-edit').style.display='none';
      document.querySelectorAll('.nav .tab')[1].style.display='none';
      document.querySelectorAll('.nav .tab')[2].style.display='none';
      document.getElementById('hdrGymName').textContent='Sin gimnasio vinculado';
      return;
    }
    currentGym=r.data.gyms;
    document.getElementById('hdrGymName').textContent=currentGym.name;
    renderGymCard();
    renderEditTab();
    loadPrices();
    loadPending();
  });
}

function renderGymCard(){
  document.getElementById('gymCard').innerHTML='<div class="info-card"><div class="info-emoji">'+(currentGym.emoji||'🏋️')+'</div><div><div class="info-name">'+currentGym.name+'</div><div class="info-cats">'+(currentGym.category||[]).join(' · ')+'</div></div></div>';
}

function switchTab(name){
  var tabs=['edit','prices','photos','pending'];
  document.querySelectorAll('.nav .tab').forEach(function(t,i){t.classList.toggle('active',tabs[i]===name);});
  tabs.forEach(function(t){document.getElementById('tab-'+t).style.display=t===name?'':'none';});
  if(name==='prices')renderPrices();
  if(name==='pending')renderPending();
  if(name==='photos')loadGymPhotos();
}

// ===== FOTOS OFICIALES (PORTAL) =====
var gymPhotos=[];
var portalPhotoTab='official';

function loadGymPhotos(){
  if(!currentGym)return;
  setPortalPhotoTab('official');
}

function setPortalPhotoTab(tab){
  portalPhotoTab=tab;
  var btnOff=document.getElementById('btnPortalOfficial');
  var btnCom=document.getElementById('btnPortalCommunity');
  if(btnOff){btnOff.style.background=tab==='official'?'#FAECE7':'#fff';btnOff.style.color=tab==='official'?'#993C1D':'#888';btnOff.style.borderColor=tab==='official'?'#D85A30':'#eee';btnOff.style.fontWeight=tab==='official'?'600':'400';}
  if(btnCom){btnCom.style.background=tab==='community'?'#FAECE7':'#fff';btnCom.style.color=tab==='community'?'#993C1D':'#888';btnCom.style.borderColor=tab==='community'?'#D85A30':'#eee';btnCom.style.fontWeight=tab==='community'?'600':'400';}
  var el=document.getElementById('portalPhotoTabContent');
  if(!el)return;
  el.innerHTML='<div class="loading">Cargando...</div>';

  if(tab==='official'){
    db.from('gym_photos').select('*').eq('gym_id',currentGym.id).order('position').then(function(r){
      gymPhotos=r.data||[];
      var grid=gymPhotos.length?
        '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">'+
          gymPhotos.map(function(p){
            return '<div style="position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden">'+
              '<img src="'+p.url+'" style="width:100%;height:100%;object-fit:cover;display:block" loading="lazy">'+
              '<button style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,.65);border:none;color:#fff;width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center" onclick="deleteGymPhoto(\''+p.id+'\')"><i class="ti ti-x"></i></button>'+
            '</div>';
          }).join('')+
        '</div>':'<div class="empty">Aún no tienes fotos oficiales</div>';

      var uploadHtml=gymPhotos.length<10?
        '<label class="cover-btn" for="gymPhotoInput"><i class="ti ti-plus"></i> Añadir foto ('+gymPhotos.length+'/10)</label>'+
        '<input type="file" id="gymPhotoInput" accept="image/*" style="display:none">':
        '<p style="font-size:13px;color:#888;text-align:center">Límite de 10 fotos alcanzado. Elimina alguna para subir nuevas.</p>';

      el.innerHTML='<p style="font-size:13px;color:#888;margin-bottom:12px;line-height:1.5">Estas fotos aparecen en la sección "Oficiales" de tu perfil en FitSpot.</p>'+grid+uploadHtml;

      var input=document.getElementById('gymPhotoInput');
      if(input)input.addEventListener('change',function(e){
        var file=e.target.files[0];if(!file)return;
        if(gymPhotos.length>=10){showToast('Límite de 10 fotos alcanzado',false);return;}
        el.innerHTML='<div class="loading">Subiendo foto...</div>';
        var ext=file.name.split('.').pop();
        var path='gyms/'+currentGym.id+'/'+Date.now()+'.'+ext;
        db.storage.from('photos').upload(path,file).then(function(r){
          if(r.error){showToast('Error: '+r.error.message,false);setPortalPhotoTab('official');return;}
          var url=db.storage.from('photos').getPublicUrl(path).data.publicUrl;
          db.from('gym_photos').insert({gym_id:currentGym.id,url:url,position:gymPhotos.length}).then(function(){
            showToast('Foto añadida');setPortalPhotoTab('official');
          });
        });
      });
    });
  } else {
    // Fotos de la comunidad en este gimnasio
    db.from('photos').select('*,profiles(username)').eq('gym_id',currentGym.id).order('created_at',{ascending:false}).then(function(r){
      var photos=r.data||[];
      if(!photos.length){el.innerHTML='<p style="font-size:13px;color:#888;margin-bottom:12px">Los usuarios aún no han compartido fotos de tu centro.</p>';return;}
      el.innerHTML='<p style="font-size:13px;color:#888;margin-bottom:12px;line-height:1.5">Fotos subidas por usuarios de FitSpot. Si necesitas eliminar alguna, solicítalo al administrador.</p>'+
        '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">'+
          photos.map(function(p){
            var uname=(p.profiles&&p.profiles.username)||'usuario';
            return '<div style="position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden">'+
              '<img src="'+p.url+'" style="width:100%;height:100%;object-fit:cover;display:block" loading="lazy" title="@'+uname+'">'+
              '<button style="position:absolute;bottom:4px;right:4px;background:rgba(162,45,45,.85);border:none;color:#fff;padding:3px 7px;border-radius:6px;font-size:11px;cursor:pointer;font-weight:600" onclick="requestPhotoDelete(\''+p.id+'\')">Solicitar borrado</button>'+
            '</div>';
          }).join('')+
        '</div>';
    });
  }
}

function deleteGymPhoto(photoId){
  if(!confirm('¿Eliminar esta foto oficial?'))return;
  db.from('gym_photos').delete().eq('id',photoId).then(function(r){
    if(r.error){showToast('Error: '+r.error.message,false);return;}
    showToast('Foto eliminada');setPortalPhotoTab('official');
  });
}

function requestPhotoDelete(photoId){
  var reason=prompt('Motivo de la solicitud (opcional):')||'';
  db.from('photo_delete_requests').insert({gym_id:currentGym.id,photo_id:photoId,reason:reason,status:'pending'}).then(function(r){
    if(r.error){showToast('Error: '+r.error.message,false);return;}
    showToast('Solicitud enviada al administrador');
  });
}

function renderEditTab(){
  var el=document.getElementById('editContent');
  var g=currentGym;
  el.innerHTML=
    '<div class="st">Datos libres <span class="tag-free"><i class="ti ti-check"></i> Edición libre</span></div>'+
    '<img class="cover-preview" id="coverPreview" '+(g.cover_image?'src="'+g.cover_image+'" style="display:block"':'')+'>'+
    '<label class="cover-btn" for="coverInput"><i class="ti ti-photo"></i> <span id="coverLabel">'+(g.cover_image?'Cambiar imagen de portada':'Subir imagen de portada')+'</span></label>'+
    '<input type="file" id="coverInput" accept="image/*" style="display:none">'+
    '<div class="fgroup"><label class="flabel">Horario</label><input class="fld" id="fHours" value="'+(g.open_hours||'')+'" placeholder="6:00–22:00"></div>'+
    '<div class="fgroup"><label class="flabel">Teléfono</label><input class="fld" id="fPhone" value="'+(g.phone||'')+'" placeholder="+34 971..."></div>'+
    '<div class="fgroup"><label class="flabel">Web</label><input class="fld" id="fWeb" value="'+(g.website||'')+'" placeholder="miweb.com"></div>'+
    '<div class="fgroup"><label class="flabel">Descripción</label><textarea class="fld ta" id="fDesc">'+(g.description||'')+'</textarea></div>'+
    '<button class="btn" onclick="saveFreeFields()">💾 Guardar cambios</button>'+
    '<hr class="divider">'+
    '<div class="st">Datos restringidos <span class="tag-lock"><i class="ti ti-lock"></i> Requiere aprobación</span></div>'+
    '<p style="font-size:13px;color:#888;margin-bottom:14px;line-height:1.5">Estos campos requieren revisión. Te avisaremos cuando se aprueben.</p>'+
    '<div class="fgroup"><label class="flabel">Nombre del gimnasio</label><div class="lockrow"><input class="fld ro" value="'+g.name+'" readonly><button class="breq" onclick="openModal(\'name\',\'Nombre del gimnasio\',\''+g.name.replace(/'/g,"\\'")+'\',\'Nuevo nombre\')"><i class="ti ti-send"></i> Solicitar</button></div></div>'+
    '<div class="fgroup"><label class="flabel">Dirección</label><div class="lockrow"><input class="fld ro" value="'+(g.address||'Sin dirección')+'" readonly><button class="breq" onclick="openModal(\'address\',\'Dirección\',\''+(g.address||'').replace(/'/g,"\\'")+'\',\'Nueva dirección\')"><i class="ti ti-send"></i> Solicitar</button></div></div>'+
    '<div class="fgroup"><label class="flabel">Categorías</label><div class="lockrow"><input class="fld ro" value="'+(g.category||[]).join(', ')+'" readonly><button class="breq" onclick="openModal(\'category\',\'Categorías\',\''+(g.category||[]).join(', ')+'\',\'ej. CrossFit, Yoga, Hyrox\')"><i class="ti ti-send"></i> Solicitar</button></div></div>';
  attachCoverListener();
}

var selectedCoverFile=null;

function attachCoverListener(){
  var input=document.getElementById('coverInput');
  if(!input)return;
  input.addEventListener('change',function(e){
    var file=e.target.files[0];
    if(!file)return;
    selectedCoverFile=file;
    var reader=new FileReader();
    reader.onload=function(ev){
      var img=document.getElementById('coverPreview');
      img.src=ev.target.result;
      img.style.display='block';
    };
    reader.readAsDataURL(file);
    document.getElementById('coverLabel').textContent='Imagen seleccionada ✓';
  });
}

function uploadCover(file){
  var ext=file.name.split('.').pop();
  var path='covers/'+Date.now()+'.'+ext;
  return db.storage.from('photos').upload(path,file).then(function(r){
    if(r.error)throw r.error;
    var pub=db.storage.from('photos').getPublicUrl(path);
    return pub.data.publicUrl;
  });
}

function saveFreeFields(){
  var coverPromise=selectedCoverFile?uploadCover(selectedCoverFile):Promise.resolve(currentGym.cover_image||null);
  coverPromise.then(function(coverUrl){
    var data={
      open_hours:document.getElementById('fHours').value.trim()||null,
      phone:document.getElementById('fPhone').value.trim()||null,
      website:document.getElementById('fWeb').value.trim()||null,
      description:document.getElementById('fDesc').value.trim()||null,
      cover_image:coverUrl
    };
    db.from('gyms').update(data).eq('id',currentGym.id).then(function(r){
      if(r.error){showToast('Error: '+r.error.message,false);return;}
      Object.assign(currentGym,data);
      selectedCoverFile=null;
      showToast('Cambios guardados');
    });
  }).catch(function(e){
    showToast('Error subiendo portada: '+(e.message||e),false);
  });
}

function loadPrices(){
  db.from('prices').select('*').eq('gym_id',currentGym.id).then(function(r){
    prices=r.data||[];
  });
}

function renderPrices(){
  var list=document.getElementById('priceList');
  list.innerHTML='';
  if(prices.length)prices.forEach(function(p){addPriceRow(p.label,p.value);});
  else addPriceRow();
}

function addPriceRow(label,value){
  var row=document.createElement('div');
  row.className='pricerow';
  row.innerHTML='<input class="fld" placeholder="Drop-in" value="'+(label||'')+'" style="flex:1.4"><input class="fld" placeholder="18€" value="'+(value||'')+'" style="flex:0.8"><button class="bdel" onclick="this.closest(\'.pricerow\').remove()"><i class="ti ti-x"></i></button>';
  document.getElementById('priceList').appendChild(row);
}

function savePrices(){
  var newPrices=[];
  document.querySelectorAll('#priceList .pricerow').forEach(function(r){
    var ins=r.querySelectorAll('input');
    if(ins[0].value.trim()&&ins[1].value.trim())newPrices.push({label:ins[0].value.trim(),value:ins[1].value.trim()});
  });
  db.from('prices').delete().eq('gym_id',currentGym.id).then(function(){
    var done=function(){
      prices=newPrices.map(function(p){return Object.assign({},p,{gym_id:currentGym.id});});
      showToast('Precios actualizados');
    };
    if(!newPrices.length){done();return;}
    db.from('prices').insert(newPrices.map(function(p){return Object.assign({},p,{gym_id:currentGym.id});})).then(function(r){
      if(r.error){showToast('Error: '+r.error.message,false);return;}
      done();
    });
  });
}

function loadPending(){
  db.from('gym_change_requests').select('*').eq('gym_id',currentGym.id).order('created_at',{ascending:false}).then(function(r){
    changes=r.data||[];
  });
}

function renderPending(){
  var el=document.getElementById('pendingList');
  if(!changes.length){el.innerHTML='<div class="empty">No tienes solicitudes enviadas</div>';return;}
  var fieldNames={name:'Nombre',address:'Dirección',category:'Categorías'};
  el.innerHTML=changes.map(function(c){
    var sCls=c.status==='pending'?'s-p':c.status==='approved'?'s-a':'s-r';
    var sTxt=c.status==='pending'?'Pendiente':c.status==='approved'?'Aprobado':'Rechazado';
    return '<div class="pend"><div class="pend-field">'+(fieldNames[c.field]||c.field)+'</div><div class="pend-vals"><span class="val-old">'+(c.old_value||'—')+'</span><span>→</span><span class="val-new">'+c.new_value+'</span></div><div><span class="statusb '+sCls+'">'+sTxt+'</span></div><div class="pend-date">'+new Date(c.created_at).toLocaleDateString('es-ES',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})+'</div></div>';
  }).join('');
}

function openModal(field,fieldName,oldVal,placeholder){
  modalField=field;modalOldVal=oldVal;
  document.getElementById('modalTitle').textContent='Solicitar cambio: '+fieldName;
  document.getElementById('modalSub').textContent='Tu solicitud será revisada. Te avisaremos cuando se apruebe o rechace.';
  document.getElementById('modalLabel').textContent='Nuevo valor para '+fieldName.toLowerCase();
  document.getElementById('modalInput').placeholder=placeholder;
  document.getElementById('modalInput').value='';
  document.getElementById('modal').classList.add('open');
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
  modalField=null;modalOldVal=null;
}

function submitRequest(){
  if(!modalField)return;
  var newVal=document.getElementById('modalInput').value.trim();
  if(!newVal){showToast('Escribe el nuevo valor',false);return;}
  db.from('gym_change_requests').insert({gym_id:currentGym.id,field:modalField,old_value:modalOldVal,new_value:newVal,status:'pending'}).select().then(function(r){
    if(r.error){showToast('Error: '+r.error.message,false);return;}
    if(r.data&&r.data[0])changes.unshift(r.data[0]);
    closeModal();
    showToast('Solicitud enviada correctamente');
    switchTab('pending');
  });
}

// Sesión activa al cargar
db.auth.getSession().then(function(r){
  if(r.data&&r.data.session){
    currentUser=r.data.session.user;
    enterPortal();
  }
});
</script>
</body>
