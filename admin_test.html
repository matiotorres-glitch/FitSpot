<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitSpot Admin Test</title>
  <style>
    body { font-family: sans-serif; padding: 40px 24px; background: #fff; }
    input { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; font-size: 16px; background: #D85A30; color: white; border: none; border-radius: 8px; cursor: pointer; }
    #result { margin-top: 20px; padding: 12px; border-radius: 8px; display: none; }
    .ok { background: #EAF3DE; color: #3B6D11; }
    .err { background: #FCEBEB; color: #A32D2D; }
  </style>
</head>
<body>
  <h2>Admin Login Test</h2>
  <input type="password" id="pass" placeholder="Contraseña">
  <button onclick="check()">Entrar</button>
  <div id="result"></div>

  <script>
    function check() {
      const input = document.getElementById('pass').value;
      const correct = [74,36,50,50,40,55,86,102,52,100,122,106];
      const res = document.getElementById('result');
      
      let ok = input.length === correct.length;
      if (ok) {
        for (let i = 0; i < correct.length; i++) {
          if (input.charCodeAt(i) !== correct[i]) { ok = false; break; }
        }
      }

      res.style.display = '';
      if (ok) {
        res.className = 'ok';
        res.textContent = '✓ Contraseña correcta! El login funciona.';
      } else {
        res.className = 'err';
        res.textContent = '✗ Contraseña incorrecta. Longitud: ' + input.length + ' (esperada: 12)';
      }
    }

    document.getElementById('pass').addEventListener('keydown', e => {
      if (e.key === 'Enter') check();
    });
  </script>
</body>
</html>
